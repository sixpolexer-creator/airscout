# AirScout — AI Agent Services (Step 2)
# Runs MCP server, n8n automation, and Redis cache as Docker services.
#
# Usage:
#   docker compose -f services/ai/docker-compose.agents.yml up -d
#
# Env vars (copy .env.example → .env before starting):
#   ANTHROPIC_API_KEY, N8N_ACCESS_TOKEN, REDIS_PASSWORD

version: "3.9"

networks:
  airscout-agents:
    driver: bridge

volumes:
  n8n-data:
  redis-data:

services:

  # ── MCP Server ─────────────────────────────────────────────────────────────
  # Exposes agent tools over JSON-RPC 2.0 (tools/call).
  # The Next.js backend POSTs to http://mcp-server:3100/rpc
  # when AGENT_DISPATCH_MODE=mcp.
  mcp-server:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../../:/app
    command: >
      sh -c "npm install --omit=dev &&
             npx tsx services/ai/mcp-server-entry.ts"
    environment:
      PORT: 3100
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: production
    ports:
      - "3100:3100"
    networks:
      - airscout-agents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── n8n Workflow Automation ─────────────────────────────────────────────────
  # Import the AirScout pricing-monitor workflow via the UI or CLI:
  #   n8n import:workflow --input=services/ai/n8n-workflows/pricing-monitor.json
  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_ACCESS_TOKEN}
      WEBHOOK_URL: http://n8n:5678
      N8N_HOST: n8n
      N8N_PORT: 5678
      GENERIC_TIMEZONE: UTC
    volumes:
      - n8n-data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - airscout-agents
    restart: unless-stopped

  # ── Redis (shared by caching layer in services/cache/) ─────────────────────
  # Configured for maxmemory-policy = allkeys-lru so the cache self-evicts
  # stale pricing data when memory is full.
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:-airscout-dev}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - airscout-agents
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
